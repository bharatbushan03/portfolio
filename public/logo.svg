<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon ring -->
  <polygon points="50,4 93,27 93,73 50,96 7,73 7,27"
    fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.7" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 50 50" to="360 50 50" dur="12s" repeatCount="indefinite"/>
  </polygon>

  <!-- Inner circle -->
  <circle cx="50" cy="50" r="28" fill="url(#grad1)" opacity="0.15"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>

  <!-- Code brackets < > -->
  <text x="50" y="57" text-anchor="middle"
    font-family="monospace" font-size="26" font-weight="bold"
    fill="url(#grad1)" filter="url(#glow)">&lt;/&gt;</text>

  <!-- Orbiting dot -->
  <circle cx="50" cy="22" r="4" fill="#a855f7" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting dot 2 -->
  <circle cx="50" cy="78" r="3" fill="#6366f1" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate"
      from="180 50 50" to="540 50 50" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
